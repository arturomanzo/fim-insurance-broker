name: CI

on:
  push:
    branches: ['**']
    paths:
      - 'fim-broker-website/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'fim-broker-website/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: fim-broker-website

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fim-broker-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Variabili stub per il build — non usate in produzione
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'stub' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'stub' }}
          FIM_EMAIL: info@fimbroker.it
          FIM_FROM_EMAIL: 'FIM Insurance Broker <noreply@fimbroker.it>'
          NEXT_PUBLIC_BASE_URL: https://www.fimbroker.it
          NEXT_PUBLIC_WHATSAPP_NUMBER: '390212345678'
