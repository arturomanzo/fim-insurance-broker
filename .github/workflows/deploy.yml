# Deployment is handled by Vercel's native GitHub integration.
#
# Setup (one-time, ~2 minutes):
#   1. Go to https://vercel.com/new
#   2. Import the repository: arturomanzo/fim-insurance-broker
#   3. Set Root Directory to: fim-broker-website
#   4. Add environment variable: ANTHROPIC_API_KEY = <your key>
#   5. Click Deploy
#
# After this, Vercel deploys automatically on every push to master.
# No GitHub secrets required.
