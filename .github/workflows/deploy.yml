name: Deploy to Vercel

on:
  push:
    branches: [master]
    paths:
      - 'fim-broker-website/**'
      - '.github/workflows/deploy.yml'

defaults:
  run:
    working-directory: fim-broker-website

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fim-broker-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Link Vercel project
        run: |
          npx vercel link \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --scope fimbroker-3525s-projects \
            --project fim-broker-website \
            --yes

      - name: Deploy to Vercel (production)
        run: |
          npx vercel deploy \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FIM_EMAIL: ${{ secrets.FIM_EMAIL }}
          FIM_FROM_EMAIL: ${{ secrets.FIM_FROM_EMAIL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
