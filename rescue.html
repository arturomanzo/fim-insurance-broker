<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIM Rescue - Sync Dati</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #1a2744; color: #fff; }
h1 { color: #d4a04a; text-align: center; }
.status { padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 16px; }
.info { background: #2a3a5c; }
.success { background: #1a5c2a; }
.error { background: #5c1a1a; }
button { display: block; width: 100%; padding: 18px; font-size: 20px; font-weight: bold; background: #d4a04a; color: #1a2744; border: none; border-radius: 10px; cursor: pointer; margin: 15px 0; }
button:active { background: #b8862e; }
#log { background: #0d1b2a; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>FIM Rescue v2</h1>
<p style="text-align:center;">Carica i dati dal localStorage al cloud Firebase (via REST API)</p>

<div id="localStatus" class="status info">Analisi dati locali...</div>
<button id="pushBtn" onclick="pushToCloud()" style="display:none;">CARICA DATI NEL CLOUD</button>
<div id="log"></div>

<script>
var DB_URL = 'https://fim-insurance-broker-default-rtdb.europe-west1.firebasedatabase.app';

function log(msg) {
  var el = document.getElementById('log');
  el.textContent += new Date().toLocaleTimeString() + ' - ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function safeParseArray(key) {
  try {
    var raw = localStorage.getItem(key);
    if (!raw) return [];
    var parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) { return []; }
}

function safeParse(key) {
  try {
    var raw = localStorage.getItem(key);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch(e) { return {}; }
}

// Elenca TUTTE le chiavi localStorage che iniziano con "fim_"
var allKeys = [];
for (var i = 0; i < localStorage.length; i++) {
  var k = localStorage.key(i);
  if (k && k.indexOf('fim') === 0) allKeys.push(k);
}
log('Chiavi localStorage trovate: ' + allKeys.join(', '));

// Check local data
var polizze = safeParseArray('fim_polizze_db');
var clienti = safeParseArray('fim_clienti');
var compagnie = safeParseArray('fim_compagnie');
var collaboratori = safeParseArray('fim_collaboratori');
var fatture = safeParseArray('fim_fatture');
var preventivi = safeParseArray('fim_preventivi');
var quotazioni = safeParseArray('fim_quotazioni');
var sinistri = safeParseArray('fim_sinistri');
var quietanze = safeParseArray('fim_quietanze');
var provTable = safeParse('fim_prov_table');
var indivProvTables = safeParse('fim_indiv_prov');
var provOverrides = safeParse('fim_prov_overrides');
var settings = safeParse('fim_settings');
var waTemplates = safeParse('fim_wa_templates');
var polizzeSaldate = safeParse('fim_polizze_saldate');
var passwordHash = localStorage.getItem('fim_password_hash') || localStorage.getItem('fimPasswordHash') || null;

var total = polizze.length + clienti.length + compagnie.length + collaboratori.length + fatture.length + preventivi.length + quotazioni.length + sinistri.length + quietanze.length;
var statusEl = document.getElementById('localStatus');

statusEl.className = 'status ' + (total > 0 ? 'success' : 'error');
statusEl.innerHTML = (total > 0 ? '<strong>Dati trovati nel localStorage!</strong>' : '<strong>Nessun dato trovato.</strong>') + '<br>' +
  'Polizze: ' + polizze.length + '<br>' +
  'Clienti: ' + clienti.length + '<br>' +
  'Compagnie: ' + compagnie.length + '<br>' +
  'Collaboratori: ' + collaboratori.length + '<br>' +
  'Fatture: ' + fatture.length + '<br>' +
  'Preventivi: ' + preventivi.length + '<br>' +
  'Quotazioni: ' + quotazioni.length + '<br>' +
  'Sinistri: ' + sinistri.length + '<br>' +
  'Quietanze: ' + quietanze.length;

if (total > 0) {
  document.getElementById('pushBtn').style.display = 'block';
  log('Totale record: ' + total);
} else {
  log('Nessun dato. Apri questa pagina dal dispositivo con i dati.');
}

// Sanitizza le chiavi per Firebase (rimuovi . $ # [ ] / e chiavi vuote)
function sanitizeKeys(obj) {
  if (obj === null || obj === undefined) return obj;
  if (Array.isArray(obj)) return obj.map(sanitizeKeys);
  if (typeof obj !== 'object') return obj;
  var clean = {};
  for (var key in obj) {
    if (!obj.hasOwnProperty(key)) continue;
    var safeKey = key.replace(/[.$#\[\]\/]/g, '_');
    if (safeKey === '') safeKey = '_empty_';
    clean[safeKey] = sanitizeKeys(obj[key]);
  }
  return clean;
}

function pushToCloud() {
  log('Inizio caricamento via REST API...');
  document.getElementById('pushBtn').disabled = true;
  document.getElementById('pushBtn').textContent = 'CARICAMENTO IN CORSO...';

  var data = sanitizeKeys({
    clienti: clienti.length > 0 ? clienti : null,
    compagnie: compagnie.length > 0 ? compagnie : null,
    polizze: polizze.length > 0 ? polizze : null,
    collaboratori: collaboratori.length > 0 ? collaboratori : null,
    fatture: fatture.length > 0 ? fatture : null,
    preventivi: preventivi.length > 0 ? preventivi : null,
    quotazioni: quotazioni.length > 0 ? quotazioni : null,
    sinistri: sinistri.length > 0 ? sinistri : null,
    quietanze: quietanze.length > 0 ? quietanze : null,
    provTable: Object.keys(provTable).length > 0 ? provTable : null,
    indivProvTables: Object.keys(indivProvTables).length > 0 ? indivProvTables : null,
    provOverrides: Object.keys(provOverrides).length > 0 ? provOverrides : null,
    settings: Object.keys(settings).length > 0 ? settings : null,
    waTemplates: Object.keys(waTemplates).length > 0 ? waTemplates : null,
    polizzeSaldate: Object.keys(polizzeSaldate).length > 0 ? polizzeSaldate : null,
    passwordHash: passwordHash,
    lastSync: new Date().toISOString()
  });

  var jsonStr = JSON.stringify(data);
  log('Dati sanitizzati OK');
  log('Dimensione dati: ' + (jsonStr.length / 1024).toFixed(1) + ' KB');

  // Usa fetch + REST API (piu compatibile con tablet)
  fetch(DB_URL + '/fim_data.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: jsonStr
  })
  .then(function(response) {
    log('Risposta HTTP: ' + response.status);
    if (!response.ok) {
      return response.text().then(function(t) { throw new Error('HTTP ' + response.status + ': ' + t); });
    }
    return response.json();
  })
  .then(function(result) {
    log('SUCCESSO! Dati caricati nel cloud!');
    statusEl.className = 'status success';
    statusEl.innerHTML = '<strong>DATI CARICATI NEL CLOUD CON SUCCESSO!</strong><br>Ora puoi aprire il gestionale da qualsiasi dispositivo.';
    document.getElementById('pushBtn').textContent = 'COMPLETATO!';
    document.getElementById('pushBtn').style.background = '#1a5c2a';
    document.getElementById('pushBtn').style.color = '#fff';
  })
  .catch(function(err) {
    log('ERRORE: ' + err.message);
    statusEl.className = 'status error';
    statusEl.innerHTML = '<strong>Errore:</strong> ' + err.message + '<br>Riprova o controlla la connessione internet.';
    document.getElementById('pushBtn').disabled = false;
    document.getElementById('pushBtn').textContent = 'RIPROVA';
  });
}
</script>
</body>
</html>
